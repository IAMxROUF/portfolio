<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logoisum | Video Editing Agency</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;700&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            barlow: ['Barlow', 'sans-serif'],
            instrument: ['"Instrument Serif"', 'serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* Subtle text shadow to ensure visibility over video without needing a background overlay */
    .text-glow {
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4), 0 1px 3px rgba(0, 0, 0, 0.6);
    }
  </style>
</head>
<body class="antialiased bg-black overflow-x-hidden">

  <nav class="fixed top-6 left-1/2 transform -translate-x-1/2 w-[95%] max-w-7xl bg-white rounded-[16px] shadow-lg z-50 px-6 py-4 flex items-center justify-between transition-all">
    
    <a href="#" class="font-barlow font-bold text-xl tracking-tight text-black">
      Logoisum.
    </a>

    <div class="hidden md:flex items-center gap-8 font-barlow font-medium text-[14px] text-gray-700">
      <a href="#" class="hover:text-black transition-colors">About</a>
      <a href="#" class="hover:text-black transition-colors">Works</a>
      <a href="#" class="hover:text-black transition-colors">Services</a>
      <a href="#" class="hover:text-black transition-colors">Testimonial</a>
    </div>

    <a href="#" class="bg-[#222] text-white px-5 py-2.5 rounded-full flex items-center gap-3 hover:bg-black transition-colors group">
      <span class="font-barlow font-medium text-[14px]">Book A Free Meeting</span>
      <div class="bg-white/20 p-1.5 rounded-full group-hover:bg-white/30 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transform -rotate-45">
          <path d="M5 12h14"></path>
          <path d="m12 5 7 7-7 7"></path>
        </svg>
      </div>
    </a>
  </nav>

  <section class="relative w-full min-h-[100svh] md:min-h-[90vh] flex flex-col items-center justify-center overflow-hidden">
    
    <video 
      autoplay 
      loop 
      muted 
      playsinline 
      class="absolute inset-0 w-full h-full object-cover pointer-events-none z-0"
    >
      <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260228_065522_522e2295-ba22-457e-8fdb-fbcd68109c73.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <div class="relative z-10 flex flex-col items-center text-center px-4 w-full max-w-5xl mt-16">
      
      <h1 class="flex flex-col items-center justify-center text-white text-glow">
        <span class="font-barlow font-bold text-4xl md:text-6xl lg:text-[72px] tracking-[-2px] md:tracking-[-4px] leading-none mb-2">
          Agency that makes your
        </span>
        <span class="font-instrument italic text-5xl md:text-[84px] leading-tight font-light">
          videos & reels viral
        </span>
      </h1>

      <p class="font-barlow font-medium text-[16px] md:text-[18px] text-white/95 mt-6 max-w-2xl text-glow">
        Short-form video editing for Influencers, Creators and Brands
      </p>

      <a href="#" class="mt-10 bg-white text-black px-8 py-4 rounded-full flex items-center gap-3 hover:scale-105 hover:shadow-xl transition-all duration-300">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
          <path fill-rule="evenodd" d="M4.5 5.653c0-1.426 1.529-2.33 2.779-1.643l11.54 6.348c1.295.712 1.295 2.573 0 3.285L7.28 19.991c-1.25.687-2.779-.217-2.779-1.643V5.653z" clip-rule="evenodd" />
        </svg>
        <span class="font-barlow font-semibold text-[16px]">See Our Workreel</span>
      </a>

    </div>
  </section>

</body>
</html>
